# CI – MyISP Tools
# Runs on every push to main and on every Pull Request.
# Validates Python syntax, checks imports, and verifies Supabase connectivity.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & syntax check ─────────────────────────────────────────────────
  lint:
    name: Python Lint & Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check app.py syntax
        run: python -c "import ast; ast.parse(open('app.py', encoding='utf-8').read()); print('✅ app.py syntax OK')"

      - name: Check supabase_client.py syntax
        run: python -c "import ast; ast.parse(open('supabase_client.py', encoding='utf-8').read()); print('✅ supabase_client.py syntax OK')"

  # ── 2. Supabase connectivity check ─────────────────────────────────────────
  supabase:
    name: Supabase Connection Test
    runs-on: ubuntu-latest
    needs: lint

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Supabase tables
        run: |
          python - <<'EOF'
          import os, sys
          from supabase import create_client

          url = os.environ.get("SUPABASE_URL", "")
          key = os.environ.get("SUPABASE_ANON_KEY", "")

          if not url or not key:
              print("⚠️  Supabase secrets not configured – skipping connection test")
              sys.exit(0)

          sb = create_client(url, key)
          tables = ["authorized_users", "team_members", "attendance_records", "attendance_logs"]
          all_ok = True
          for table in tables:
              try:
                  sb.table(table).select("*").limit(1).execute()
                  print(f"  ✅ {table}: OK")
              except Exception as e:
                  print(f"  ❌ {table}: FAILED – {e}")
                  all_ok = False

          sys.exit(0 if all_ok else 1)
          EOF
