services:
  - type: web
    name: myisp-tools
    env: python
    region: singapore   # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT app:app
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false          # set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
